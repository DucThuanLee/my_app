services:
  db:
    image: postgres:16-alpine
    container_name: restaurant_db
    environment:
      POSTGRES_DB: thfamily18_restaurant
      POSTGRES_USER: thfamily18
      POSTGRES_PASSWORD: thfamily18@
    ports:
      - "5432:5432"
    volumes:
      - restaurant_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thfamily18 -d thfamily18_restaurant"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Spring profile for Docker
      SPRING_PROFILES_ACTIVE: docker

      # DB
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/thfamily18_restaurant?currentSchema=public
      SPRING_DATASOURCE_USERNAME: thfamily18
      SPRING_DATASOURCE_PASSWORD: thfamily18@

      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: "classpath:db/migration"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "1"
      SPRING_FLYWAY_SCHEMAS: public
      SPRING_FLYWAY_DEFAULT_SCHEMA: public

      # IMPORTANT: do not let Hibernate mutate schema when using Flyway
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

      # Actuator exposure
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"

      # Logging
      LOGGING_LEVEL_ORG_FLYWAYDB: INFO

      JAVA_OPTS: "-XX:MaxRAMPercentage=75"
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: restaurant_prometheus
    depends_on:
      - app
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: restaurant_grafana
    depends_on:
      - prometheus
    environment:
      # Default Grafana admin account (change later)
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      # Auto-provision Prometheus datasource
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

volumes:
  restaurant_db_data:
  prometheus_data:
  grafana_data: